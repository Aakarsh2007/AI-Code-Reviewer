version: "3.9"

services:
  # ── Python AI Microservice ─────────────────────────────────────────────────
  ai-service:
    build: ./ai-service
    container_name: codesense-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URI=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=["http://localhost:3000"]
      - DEBUG=false
    depends_on:
      - redis
    networks:
      - codesense

  # ── Next.js Web App ────────────────────────────────────────────────────────
  web:
    build: ./web
    container_name: codesense-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_URI=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - AI_SERVICE_URL=http://ai-service:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - redis
      - ai-service
    networks:
      - codesense

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codesense-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - codesense

volumes:
  redis_data:

networks:
  codesense:
    driver: bridge
